<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Happy Mother's Day 💕</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg-hearts"></div>

<!-- OPENING -->
<section class="screen active" id="opening">
  <div class="gift" id="gift">
    <div class="lid"></div>
    <div class="base"></div>
  </div>
</section>

<!-- INTRO -->
<section class="screen" id="intro">
  <h1>Happy Mother’s Dayy 💕</h1>
  <p class="type" data-text="Happy Mother’s Day mommy !!
I just wanted to thank you for everything you had done for me, and to also celebrate this day with you."></p>

  <div class="nav">
    <button class="heart-btn next">Next</button>
  </div>
</section>

<!-- APPRECIATION -->
<section class="screen" id="appreciation">
  <h1>My Appreciation</h1>
  <p class="type" data-text="I really appreciate all the time you and I spend together, yes we might not talk as much, but even in the silence I really do enjoy your presence.
YES even though I ask you 'why you home so early.' I do enjoy the presence, ANDDD because I get to annoy you once you arrive home LOLL.
I do wish that we could go out more and create a whole bunch more memories aswell as capture them so that sometime in the future we can all look back at them and reminisce about that day."></p>

  <div class="nav">
    <button class="heart-btn prev">Back</button>
    <button class="heart-btn next">Next</button>
  </div>
</section>

<!-- THANK YOU -->
<section class="screen" id="thanks">
  <h1>Thank youu for everything</h1>
  <p class="type" data-text="Besides all of that I hope you enjoy your special day today and remember that I love you and thank you for everything you do for Chloe and I.
I LOVE YOUUU ❤️✨"></p>

  <div class="nav">
    <button class="heart-btn prev">Back</button>
    <button class="heart-btn next">Final</button>
  </div>
</section>

<!-- FINAL -->
<section class="screen" id="final">
  <div class="final-heart" id="finalHeart">
    <span class="final-text">I love you ❤️<br>Thank you for everything</span>
  </div>

  <div class="nav">
    <button class="heart-btn prev">Back</button>
  </div>
</section>

<script src="script.js"></script>
</body>
</html>
